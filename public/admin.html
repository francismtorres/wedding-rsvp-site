<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP Admin</title>
    <meta name="description" content="Wedding RSVP Admin Dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-page">
    <main class="section section-cream">
      <div class="container">
        <header class="centered-card" style="margin-bottom: 2rem;">
          <p class="section-subtitle">Wedding Dashboard</p>
          <h1 class="section-title">RSVP Admin</h1>
        </header>

        <section class="card-grid three-col" style="margin-bottom: 2rem;">
          <article class="card centered-card">
            <p class="section-subtitle" style="margin-bottom: 0.5rem;">Total RSVPs</p>
            <h2 id="statsTotal">0</h2>
          </article>

          <article class="card centered-card">
            <p class="section-subtitle" style="margin-bottom: 0.5rem;">Plus Ones</p>
            <h2 id="statsPlusOne">0</h2>
          </article>

          <article class="card centered-card">
            <p class="section-subtitle" style="margin-bottom: 0.5rem;">Total Guests</p>
            <h2 id="statsGuests">0</h2>
          </article>
        </section>

        <section class="card table-card">
          <div style="padding-bottom: 1rem;">
            <h2 style="margin: 0;">Guest List</h2>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Dietary Option</th>
                  <th>Details</th>
                  <th>Submitted</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="adminTableBody">
                <tr>
                  <td colspan="7">Loading RSVPs...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
